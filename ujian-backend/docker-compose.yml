version: '3.8'

services:
  # Container Database
  db:
    image: mysql:8.0
    container_name: db_laravel
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ujian_backend
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "3306:3306"

  # Container phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma_laravel
    restart: always
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    ports:
      - "8081:80"